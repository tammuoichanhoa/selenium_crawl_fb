login:
  # One of: cookies, profile. You can still override via LOGIN_METHOD in .env
  method: profile
  # Set to false to see the browser UI. Recommended true for automation.
  headless: false
  # Where Selenium stores the Chrome user data dir.
  profile_dir: ./chrome_profile

crawl:
  pages_file: pages.txt
  max_workers: 3
  login_stagger_seconds: 2
  profile_dirs:
    - ./chrome_profile_1
    - ./chrome_profile_2
    - ./chrome_profile_3
  wait_after_load: 3
  wait_between_pages: 2
  element_timeout: 15
  output_file: crawl_results.json
  elements:
    - name: page_title
      by: css
      selector: 'h1'
      attribute: text

    - name: followers
      by: xpath
      selector: '//a[contains(@href,"followers")]'
      attribute: text

    - name: following
      by: xpath
      selector: '//a[contains(@href,"following")]'
      attribute: text

    # --- Chi tiết ---
    - name: recommendation_rating
      by: xpath
      selector: '//span[contains(normalize-space(.),"đề xuất") and contains(normalize-space(.),"lượt đánh giá")]'
      attribute: text

    - name: address
      by: xpath
      selector: '//a[contains(@href,"bing.com/maps") and contains(@href,"where1=")]'
      attribute: text

    # --- Liên kết ---
    - name: website
      by: xpath
      selector: '//a[contains(@href,"hkuk.vn")]'
      attribute: text

